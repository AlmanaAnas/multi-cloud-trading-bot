# .github/workflows/tf-plan.yml
#
# Runs on every Pull Request to main.
# Shows what Terraform WOULD change without applying anything.
# Post the plan output as a PR comment so reviewers can see it.

name: Terraform plan

on:
  pull_request:
    branches: [main]

permissions:
  id-token: write   # required for OIDC authentication
  contents: read
  pull-requests: write  # required to post PR comments

jobs:
  plan:
    name: Terraform plan — dev
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Authenticate to GCP via Workload Identity
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.6.0"

      - name: Terraform init
        working-directory: environments/dev
        run: terraform init

      - name: Terraform format check
        working-directory: environments/dev
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform validate
        working-directory: environments/dev
        run: terraform validate

      - name: Terraform plan
        id: plan
        working-directory: environments/dev
        run: terraform plan -no-color -out=tfplan
        continue-on-error: true

      # Post the plan output as a comment on the PR
      - name: Post plan to PR
        uses: actions/github-script@v7
        with:
          script: |
            const output = `#### Terraform Plan 📋
            \`\`\`
            ${{ steps.plan.outputs.stdout }}
            \`\`\`
            *Pushed by: @${{ github.actor }}, Action: \`${{ github.event_name }}\`*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            })

      - name: Plan status
        if: steps.plan.outcome == 'failure'
        run: exit 1